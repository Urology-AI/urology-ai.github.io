<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>
  <body>
    <div class="page-frame">

      <aside class="sidebar">
        <div class="sidebar-brand">
          <a class="brand-name" href="{{ "/" | relative_url }}">Tewari<span>Lab</span></a>
          <p class="brand-institution">Icahn School of Medicine at Mount Sinai</p>
        </div>

        <div class="sidebar-description">
          Clinical AI &middot; Surgical Intelligence &middot; Prostate Cancer Care
        </div>

        <nav class="sidebar-nav">
          <a href="{{ "/projects" | relative_url }}">
            <span class="nav-icon"><i class="fas fa-flask"></i></span>
            Research Projects
          </a>
          <a href="{{ "/publications" | relative_url }}">
            <span class="nav-icon"><i class="far fa-file-alt"></i></span>
            Publications
          </a>
          <a href="{{ "/people" | relative_url }}">
            <span class="nav-icon"><i class="fas fa-users"></i></span>
            Lab Members
          </a>
        </nav>

        <div class="sidebar-footer">
          <a href="https://icahn.mssm.edu/about/departments-offices/urology" target="_blank" rel="noopener">
            <i class="fas fa-external-link-alt"></i> Mount Sinai Urology
          </a>
        </div>
      </aside>

      <main class="content">
        <div class="content-inner">
          {{ content }}
        </div>
      </main>

    </div>
  </body>
</html>
